# .do/app.yaml - Configuración para DigitalOcean App Platform
name: combustible-app
services:
  - name: web
    source_dir: /
    github:
      repo: xoyoc/KasuCombustible
      branch: main
      deploy_on_push: true
    run_command: gunicorn --bind 0.0.0.0:$PORT combustible.wsgi:application --workers 2 --timeout 120
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: combustible.settings
      - key: PORT
        value: "8080"
      - key: PYTHONPATH
        value: "/app"
    health_check:
      http_path: /
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

databases:
  - name: combustible-db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1

envs:
  - key: SECRET_KEY
    type: SECRET
  - key: DEBUG
    value: "False"
  - key: ALLOWED_HOSTS
    value: "squid-app-5j4xm.ondigitalocean.app"
  - key: USE_SPACES
    value: "True"
  - key: DJANGO_SETTINGS_MODULE
    value: "combustible.settings"
  - key: PYTHONPATH
    value: "/app"
  - key: DJANGO_DB_URL
    value: "${combustible-db.DATABASE_URL}"
  - key: DO_SPACES_ACCESS_KEY
    type: SECRET
  - key: DO_SPACES_SECRET_KEY
    type: SECRET
  - key: DO_SPACES_BUCKET_NAME
    value: ""
  - key: DO_SPACES_ENDPOINT_URL
    value: "https://nyc3.digitaloceanspaces.com"
  - key: DO_SPACES_REGION
    value: "nyc3"
  - key: WHATSAPP_PHONE_NUMBER_ID
    type: SECRET
  - key: WHATSAPP_ACCESS_TOKEN
    type: SECRET
  - key: WHATSAPP_VERIFY_TOKEN
    type: SECRET
  - key: EMAIL_HOST_PASSWORD
    type: SECRET
